<header class="main_header work-header mx-8 lg:mx-auto" style="max-width: 825px;">
  <div class="mx-4 lg:mx-0 justify-between flex md:flex-row flex-col gap-4 items-center">
    <span class="title">
      <a href="/">
        <img src="/logo-light.svg" alt="{{ .Site.Title }}" />
      </a>
    </span>
    <div class="flex md:flex-row flex-col gap-8 items-center">
      <input id="burger" type="checkbox" />
      <label class="burger_label" for="burger">
        <span></span>
        <span></span>
        <span></span>
      </label>
      <nav class="main_menu">
        <ul>
          {{ range $index, $element := .Site.Menus.main }}
            <li>
              <a class="nav-item{{ if or ($.IsMenuCurrent "main" $element) ($.HasMenuCurrent "main" $element) }} active{{ end }}"
                 href="{{ $element.URL }}"
                 title="{{ $element.Title }}">{{ $element.Name }}</a>
            </li>
          {{ end }}
        </ul>
      </nav>
      {{ partial "social_icons" . }}
    </div>
  </div>
</header>
